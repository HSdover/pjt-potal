spring:
  application:
    name: governance-portal-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${GOVERNANCE_DATASOURCE_URL:jdbc:h2:mem:governance;MODE=Oracle;DB_CLOSE_DELAY=-1}
    driver-class-name: ${GOVERNANCE_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${GOVERNANCE_DATASOURCE_USERNAME:sa}
    password: ${GOVERNANCE_DATASOURCE_PASSWORD:}
  sql:
    init:
      mode: ${GOVERNANCE_SQL_INIT_MODE:embedded}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  cache:
    type: simple
  h2:
    console:
      enabled: ${GOVERNANCE_H2_CONSOLE_ENABLED:true}
      path: /h2-console

server:
  port: ${SERVER_PORT:18080}
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  sample-data:
    enabled: ${GOVERNANCE_SAMPLE_DATA_ENABLED:true}
    hira-csv-path: ${GOVERNANCE_HIRA_SAMPLE_CSV:}
  frontend-dev-server:
    enabled: ${GOVERNANCE_FRONTEND_DEV_SERVER_ENABLED:false}
    restart: ${GOVERNANCE_FRONTEND_DEV_SERVER_RESTART:false}
    build-before-start: ${GOVERNANCE_FRONTEND_DEV_SERVER_BUILD_BEFORE_START:false}
    port: ${GOVERNANCE_FRONTEND_DEV_SERVER_PORT:5173}
    working-directory: ${GOVERNANCE_FRONTEND_DEV_SERVER_DIR:../frontend}
    command: ${GOVERNANCE_FRONTEND_DEV_SERVER_COMMAND:npm.cmd}
    args: ${GOVERNANCE_FRONTEND_DEV_SERVER_ARGS:run,dev}
    build-command: ${GOVERNANCE_FRONTEND_DEV_SERVER_BUILD_COMMAND:npm.cmd}
    build-args: ${GOVERNANCE_FRONTEND_DEV_SERVER_BUILD_ARGS:run,build}
